	<script type="text/javascript">
		var websocket = null;
		var timerId = null;
		var bigImageEmpty = true;
		var bCardDetectedNotification = false; /* 检测到证件放入或拿出时,是否会发送通知; 当启用回调模式时, 此变量也会设置为true */
		
		var bConnected = false;
		
		var checkInterval;//储存setinterval返回的定时器ID
		var reconnectInterval = 2; // 重新连接的时间间隔，单位为毫秒
		var autoReconnect = false; // 自动重连标志，初始状态为不自动重连
			
		var strTltle;
		var strConnect = "建立连接";
		var strDisconnect = "断开连接";
		var strDeviceStatus = "设备状态";
		var strDeviceConnected = "设备已连接";
		var strDeviceName = "设备名称"
		var strDeviceSerialno = "设备序列号";
		var strVersion = "版本";
		var strDevNotConnect = "设备未连接";
		var strDescOfWebsocketError = "连接出错,请确认证件采集助手的WebSocket服务是否正常运行，并重新建立连接";
		var strDescFailSetRFID = "设置是否读取芯片信息出错";
		var strDescFailSetVIZ = "设置是否识别版面信息出错";
		var strPlaceHolderCardTextInfo = "此处显示从证件读取的文本信息";
		var strDescFailSendWebsocket = "向后台服务发送指令出错";
		var strDeviceOffLine = "设备掉线";
		var strDeviceReconnected = "设备已重新连接";
		var strWebDescDeviceNotFound = "证件采集助手的WebSocket已连接, 未检测到设备";
		var strWebDescRequireRestartSvc = "证件采集助手的WebSocket服务需要重新启动";
		var strWebDescAskForSupport = "证件采集助手的WebSocket服务遇到问题, 请联系管理员";
		var strWebDescRequireReconnect = "证件采集助手的WebSocket服务要求web端重新建立连接";
		var strAcquireImageFailed = "采集图像失败";
		var strRecogFailed = "识别出错"
		var strInitIDCardFailed = "初始化读卡核心失败"
		var strInitIDCardFailedMessage = "初始化读卡核心失败,请检测设备是否连接正常"
		var host = "ws://127.0.0.1:90/echo";

		var ocrHeadIMG = null;
		
		window.onload = function() {
			document.getElementById("connection").value = strConnect;
			change();
		}
					
		/* 关闭页面前，先关闭websocket连接 */
		window.onbeforeunload = function(event) {
			if (websocket !== null) {
				websocket.close();
				websocket = null;
			}
		}
		
		function setConnBtnValue() {
			if (bConnected) {
				document.getElementById("connection").value = strDisconnect;
			} else {
				document.getElementById("connection").value = strConnect;
			}
		}
			
		/*----------------------------------------------------------------------------------------*/
		/*检查websocket的连接状态，连接成功停止检查，不成功就尝试重新连接*/
		function checkWebSocketConnection() {
			if (websocket && websocket.readyState === WebSocket.OPEN) {
				clearInterval(checkInterval);  // 如果连接成功，停止检查
			} else {
				retryConnection();  // 尝试重新连接
			}
		}
		
		/*尝试重新连接*/
		function retryConnection() {
			// 设置一个延时重新连接
			setTimeout(function() {
				connect();
			}, reconnectInterval);
		}
		/*----------------------------------------------------------------------------------------*/

		/* 建立WebSocket连接并初始化websocket属性 */
		function connect() {
			try {
				if (websocket != null) {
					websocket.close();
				}
				websocket = new WebSocket(host);
				
				/* 成功建立websocket连接 */
				websocket.onopen = function() {
					bConnected = true;
					setConnBtnValue();
					
					getWebConstants();
					
					setDefaultSettings();
		
					/*设置获取DG源信息*/
					<!-- setDGContent(); -->
					
					timerId = setInterval(getDeviceStatus(), 1000);
				}
				
				/* 响应后台服务的应答报文或通知报文 */
				websocket.onmessage = function(event) {
					var retmsg = event.data;
					var jsonMsg;
					
					try {
						jsonMsg = JSON.parse(retmsg);
						
						if (jsonMsg.Type == 'Reply') 
						{
							if (jsonMsg.hasOwnProperty('Commands')) 
							{
								for (var index in jsonMsg.Commands) 
								{
									processReply(jsonMsg.Commands[index]);
								}
							} else 
							{
								processReply(jsonMsg);
							}
						} else if (jsonMsg.Type == 'Notify') 
						{
							processNotify(jsonMsg);
						}
						return;
					} catch (exception) {
						// document.getElementById("msg").innerHTML = "Parse error: " + event.data;
					}
				}
				
				/* 主动或被动关闭websocket连接时触发，清空页面信息 */
				websocket.onclose = function() {
					bConnected = false;
					setConnBtnValue();
					// document.getElementById('connection').value = strConnect; // "建立连接";
					clrDeviceStatus();
					clrTextInfo();
					clrImages(true);
					// websocket = null;
					
					if (websocket !== null) {
						if (websocket.readyState == 3) {
							document.getElementById('deviceStatus').innerHTML = strDescOfWebsocketError;
							document.getElementById('deviceStatus').style.color = '#f00';
						}
						websocket.close();
						websocket = null;
					}
					//如果自动重连标志为true，定时自动重连
					if (autoReconnect) {
						checkInterval = setTimeout(checkWebSocketConnection, 1000);
					}
				}
				
				/* websocket出错事件，清空页面信息并报警 */
				websocket.onerror = function(evt) {
					bConnected = false;
					setConnBtnValue();
					// document.getElementById('connection').value = strConnect; // "建立连接";
					clrDeviceStatus();
					clrTextInfo();
					clrImages(true);
				}
				
			} catch (exception) {
				// document.getElementById("msg").innerHTML = "WebSocket  error";
			}
		}
			
		/* 页面点击建立连接按钮时触发此函数 */
		function onConnection() {
			if (document.getElementById("connection").value == strConnect /*'建立连接'*/) {
				if (websocket !== null) {
					websocket.close();
					websocket = null;
				}
				
				connect();
			} else {
				if (websocket !== null) {
					websocket.close();
					websocket = null;
					
					//window.location.reload();
				}
			}
		}

		/* 页面向后台发送指令，后台返回应答 */
		function processReply(msgReply) {
			document.getElementById("errorMessageKey").style.display = "none";
			document.getElementById("errorMessage").innerHTML = "";
			if (msgReply.Command == 'Get') 
			{
				if (msgReply.Succeeded == 'Y') 
				{ /* Get指令成功执行，从应答报文中解析出对应的结果 */
					if (msgReply.Operand == 'DeviceName') { /* 应答报文中的设备名称 */
						document.getElementById('deviceName').innerHTML = /* strDeviceName + ":" + */ msgReply.Result;
					} else if (msgReply.Operand == 'DeviceSerialNo') { /* 应答报文中的设备序列号 */
						document.getElementById('deviceSerial').innerHTML = /* strDeviceSerialno + ":" + */ msgReply.Result;
					} else if (msgReply.Operand == 'OnLineStatus') { /* 应答报文中的设备在线状态 */
						document.getElementById('deviceStatus').innerHTML = /* strDeviceStatus + ":" + */ msgReply.Result;
						if (msgReply.Result == strDeviceConnected) {
							document.getElementById('deviceStatus').style.color = '#51B018';
							document.getElementById('deviceNameKey').style.display = 'inline';
							document.getElementById('deviceSerialKey').style.display = 'inline';
							/*-----------------以下解决自动连接和护照阅读机下拉框可以根据中英文进行变化---------------*/
							// 通过检查 strDeviceConnected 的值是否是 "Device is connected" 来进行中英文变化
							if (strDeviceConnected === "Device is connected") {
								document.getElementById("autoconnection").innerText = "Auto Connect";
								document.getElementById("DevType").options[0].text = "Passport Reader";
								document.getElementById("DevType").options[1].text = "Scanner";
								document.querySelector("#divPageTitle h1").innerText = "Sinosecu Document Recognition System"; // 更新页面标题
							}
							else
							{
								document.getElementById("autoconnection").innerText = "自动连接";
								document.getElementById("DevType").options[0].text = "护照阅读机";
								document.getElementById("DevType").options[1].text = "扫描仪";
								document.querySelector("#divPageTitle h1").innerText = "中安证件识别系统"; // 更新页面标题
							}
							/*-----------------以上解决自动连接和护照阅读机下拉框可以根据中英文进行变化---------------*/
						}
					} else if(msgReply.Operand=='VersionInfo'){
						document.title = strTitle + msgReply.Result;
						document.getElementById("versionsKey").style.display = "inline";						
						if (strDeviceConnected === "Device is connected") {
							document.getElementById("versionsKey").innerHTML = "Version:"; 
						} else {
							document.getElementById("versionsKey").innerHTML = "版本:"; 
						}					
						document.getElementById("versions").innerText = msgReply.Result;
					} else if (msgReply.Operand == 'DeviceType') {
						if (msgReply.Result == 'Scanner') {
							document.getElementById("deviceSerialKey").style.display = "none";
							document.getElementById("idScanDocument").style.display = "inline";
						}
						else{
							document.getElementById("idScanDocument").style.display = "none";
						}
					
						var domDevType = document.getElementById("DevType");
						for (i = 0; i < domDevType.options.length; ++i) {
							if (msgReply.Result == domDevType.options[i].value) {
								domDevType.options[i].selected = true;
							}
						}
					} else if (msgReply.Operand == 'WebConstant') {
						if (msgReply.Param == 'CardRecogSystem') {
							strTitle = msgReply.Result;
						} else if (msgReply.Param == 'Connect') {
							strConnect = msgReply.Result;
							setConnBtnValue();
							// document.getElementById("connection").value = msgReply.Result;
						} else if (msgReply.Param == 'Disconnect') {
							strDisconnect = msgReply.Result;
							setConnBtnValue();
							// document.getElementById("connection").value = msgReply.Result;
						} else if (msgReply.Param == 'Save') {
							document.getElementById("btnSaveSettings").value = msgReply.Result;
						} else if (msgReply.Param == 'IDCANCEL') {
							document.getElementById("btnCancelSave").value = msgReply.Result;
						} else if (msgReply.Param == 'DeviceStatus') {
							strDeviceStatus = msgReply.Result;
						} else if (msgReply.Param == 'DeviceName') {
							strDeviceName = msgReply.Result;
							document.getElementById('deviceNameKey').innerHTML = strDeviceName + ":";
						} else if (msgReply.Param == 'Version') {
							strVersion = msgReply.Result;
							document.getElementById('versionsKey').innerHTML = strVersion + ":";
						}else if (msgReply.Param == 'DeviceSerialno') {
							strDeviceSerialno = msgReply.Result;
							document.getElementById('deviceSerialKey').innerHTML = strDeviceSerialno + ":";
						} else if (msgReply.Param == 'DeviceNotConnected') {
							strDevNotConnect = msgReply.Result;
						} else if (msgReply.Param == 'DescOfWebsocketError') {
							strDescOfWebsocketError = msgReply.Result;
						} else if (msgReply.Param == 'DescFailSetRFID') {
							strDescFailSetRFID = msgReply.Result;
						} else if (msgReply.Param == 'DescFailSetVIZ') {
							strDescFailSetVIZ = msgReply.Resultl;
						} else if (msgReply.Param == 'PlaceHolderCardTextInfo') {
							// strPlaceHolderCardTextInfo = msgReply.Result;
							// document.getElementById("msg").setAttribute("placeholder", strPlaceHolderCardTextInfo);
						} else if (msgReply.Param == 'DescFailSendWebsocket') {
							strDescFailSendWebsocket = msgReply.Result;
						} else if (msgReply.Param == 'DeviceOffLine') {
							strDeviceOffLine = msgReply.Result;
						} else if (msgReply.Param == 'DeviceReconnected') {
							strDeviceReconnected = msgReply.Result;
						} else if (msgReply.Param == 'WebDescDeviceNotFound') {
							strWebDescDeviceNotFound = msgReply.Result;
						} else if (msgReply.Param == 'WebDescRequireRestartSvc') {
							strWebDescRequireRestartSvc = msgReply.Result;
						} else if (msgReply.Param == 'WebDescAskForSupport') {
							strWebDescAskForSupport = msgReply.Result;
						} else if (msgReply.Param == 'WebDescRequireReconnect') {
							strWebDescRequireReconnect = msgReply.Result;
						} else if (msgReply.Param == 'DeviceConnected') {
							strDeviceConnected = msgReply.Result;
						}
					}
				}else if(msgReply.Succeeded == 'N'){
					if(msgReply.Operand == 'TakePhotoOcr'){
											
						document.getElementById("errorMessageKey").style.display = 'inline';
						document.getElementById("errorMessage").innerHTML = msgReply.Result;
						
					}
				}
			} else if (msgReply.Command == 'Set') {
				if (msgReply.Succeeded == 'N') { /* Set指令未生效 */
					if (msgReply.Operand == 'RFID') {
						document.getElementById("msg").innerHTML = strDescFailSetRFID;
					} else if (msgReply.Operand == 'VIZ') {
						//document.getElementById("msg").innerHTML = strDescFailSetVIZ;
					}
				}
			}
		}
			
		/* 后台服务主动向web端发送消息，包括读卡信息、证件图像以及异常状态通知等 */
		function processNotify(msgNotify) {
			document.getElementById("errorMessageKey").style.display = "none";
			document.getElementById("errorMessage").innerHTML = "";
			if (msgNotify.Command == 'Display') 
			{
				if(msgNotify.Param == strAcquireImageFailed){	
					clrTextInfo()
					clrImages(true);					
					document.getElementById("errorMessageKey").style.display = 'inline';
					document.getElementById("errorMessage").innerHTML = strAcquireImageFailed;				
				}
				if(msgNotify.Param == strRecogFailed){	
					clrTextInfo()
					clrImages(true);					
					document.getElementById("errorMessageKey").style.display = 'inline';
					document.getElementById("errorMessage").innerHTML = strRecogFailed;				
				}
				if (msgNotify.Param == strDeviceOffLine) {
					clrDeviceStatus();
					document.getElementById('deviceStatus').innerHTML = strWebDescDeviceNotFound; // "WebSocket已连接, 未检测到设备";
					document.getElementById('deviceStatus').style.color = '#f00';
				} else if (msgNotify.Param == strDeviceReconnected) {
					getDeviceStatus();
				}
				else if(msgNotify.Param == strInitIDCardFailed){
					document.getElementById('deviceStatus').innerHTML = strInitIDCardFailedMessage;
					document.getElementById('deviceStatus').style.color = '#f00';
				}
			} else if (msgNotify.Command == 'Reconnect') 
			{
				clrDeviceStatus();
				document.getElementById('deviceStatus').innerHTML = strWebDescRequireReconnect; // "WebSocket服务要求web端重新建立连接，正在重连";
				document.getElementById('deviceStatus').style.color = '#f00';
				disConnect();
				connect();
			} else if (msgNotify.Command == 'AskSupport') 
			{
				clrDeviceStatus();
				document.getElementById('deviceStatus').innerHTML = strWebDescAskForSupport; // "WebSocket服务遇到问题：" + msgNotify.Param;
				document.getElementById('deviceStatus').style.color = '#f00';
			} else if (msgNotify.Command == 'RestartService') 
			{
				/* disConnect(); */
				document.getElementById('deviceStatus').innerHTML = strWebDescRequireRestartSvc; // "WebSocket服务需要重新启动，请联系管理员";
				document.getElementById('deviceStatus').style.color = '#f00';
			} else if (msgNotify.Command == 'Save') 
			{
				if (msgNotify.Operand == 'CardContentText') {
					clrImages(false);
					displayCardContent(msgNotify.Param);
				} else if (msgNotify.Operand == 'Images') {
				console.log("10")
					clrImages(false);
					displayImages(msgNotify.Param); 
					ocrHeadIMG = msgNotify.Param.OcrHead;
					if(ocrHeadIMG==undefined){
						ocrHeadIMG = msgNotify.Param.SidHead;
					}
					drawHeadIMG(ocrHeadIMG)
					
				} else if (msgNotify.Operand == 'DocInfoAllInOne') {
					clrTextInfo()
					clrImages(true);
					displayCardContent(msgNotify.Param.Fields);
					displayImages(msgNotify.Param.Images);
				}

			} else if (msgNotify.Command == 'CardDetected') 
			{
				clrTextInfo()
				clrImages(true);
			}
		}
		
		/*  解析证件文本信息（JSON格式）并展示到页面 */
		function displayCardContent(cardContent) {

			let hasCanvas = document.getElementById("canvasBox").childNodes;
			if(hasCanvas.length>0){
				document.getElementById("canvasBox").innerHTML = "";;
			}
			let CARD_MAINID = cardContent.CARD_MAINID;
			let RFID_MAINID = cardContent.RFID_MAINID; 
			if(cardContent.RFID_MAINID==2 && cardContent.CARD_MAINID==undefined){
				drawIMG(cardContent)
			}else{
				document.getElementById('imageDisplay').style.display = 'block'; 
				let thumbnail_mainCanvas = document.getElementById("thumbnail_mainCanvas");
				if(thumbnail_mainCanvas!==null){
					document.getElementById('identityCard').style.display = 'block'; 
					removeCanvas('thumbnail_mainCanvas');
				}
				let thumbnail_backCanvas = document.getElementById("thumbnail_backCanvas");
				if(thumbnail_backCanvas!==null){
					document.getElementById('identityCardBack').style.display = 'block'; 
					removeCanvas('thumbnail_backCanvas');
				}
			}
			
			var domTextArea = document.getElementById('divTextArea');
			var domTextItem;
			var domKeySpan;
			var domSource = null;
			var domValInput;
			
			domTextArea.innerHTML = "";
			
			for (var key in cardContent) {
				domTextItem = document.createElement('div');
				domKeySpan = document.createElement('span');
				domValInput = document.createElement('input');
				
				domTextItem.className = 'cTextItem';
				
				domKeySpan.className = 'cTextKey';
				domKeySpan.innerText = key;
				
				domValInput.className = 'cTextValue';
				domValInput.setAttribute('readonly', 'readonly');
				
				var cont = cardContent[key];
				if (cont.hasOwnProperty("Content") && cont.hasOwnProperty("Source")) {
					domSource = document.createElement('input');
					domSource.className = 'cTextSource';
					domSource.setAttribute('readonly', 'readonly');
					domSource.value = cont.Source;
					domValInput.value = cont.Content;
				} else {
					domValInput.value = cardContent[key];
				}
				
				domTextItem.appendChild(domKeySpan);
				if (domSource != null) {
					domTextItem.appendChild(domSource);
				}
				domTextItem.appendChild(domValInput);
				domTextArea.appendChild(domTextItem);
			}
			
			console.log("222")

			///cDivSmallImage
			const deleteItems = document.querySelectorAll('.imgShow');
  			deleteItems.forEach(item => item.classList.remove('imgShow'));
		}

		}

			document.getElementById("divTextArea").innerHTML = "";
		}

				document.getElementById("imageWhite").src = "png/Home_pic_bgicon.png";

		function sendJson(jsonData) {
			try {
				if (websocket !== null) {
					websocket.send(JSON.stringify(jsonData));
				}
			} catch (exception) {
				//document.getElementById("msg").innerHTML = strDescFailSendWebsocket;
			}
		}

		/* 获取设备状态、核心版本，一次性发送多条指令 */
		function getDeviceStatus() {
			var request = {
				Type: "Request",
				Commands: [
					{Command:"Get", Operand:"OnLineStatus"},  /* 获取设备在线状态 */
					{Command:"Get", Operand:"DeviceName"},    /* 获取设备名称 */

		function dataSplit(val){

		function drawOnCanvas(data,image, canvas) {
			//图像原始宽 naturalWidth、元素宽 offsetWidth
		  	const context = canvas.getContext("2d");

		  	// 绘制图像到画布：源图像裁剪区域 (sx, sy, sw, sh)、目标画布绘制区域 (dx, dy, dw, dh)
			canvas.width = imgWidth;
			canvas.height = imgHeight;
			context.drawImage(image, 0, 0 );

			context.font="60px Arial";
			context.textAlign="left";
			drawTextWithSpacing(context, data['姓名'], 356, 256, 12); // 添加 10px 字间距

			context.font="56px Arial";
			context.textAlign="left";
			context.fillText(data['性别'], 354, 400);
			context.fillText(data['民族'], 754, 400);

			var birthdate = data['出生'];
		    if(birthdate ==undefined){
		    	birthdate = data['出生日期']
		    }

			// 检查 birthdate 是否存在
			if (typeof birthdate === "undefined" || !birthdate) {
			  // console.error("birthdate 未定义或为空");
			} else {
				let dateVal = dataSplit(birthdate);
			  	//.padStart(2, '') 补0、.replace(/^0+/, ''); // 正则移除开头的0
				context.fillText(dateVal[1], 354, 540);
				context.fillText(dateVal[2].replace(/^0+/, ''), 680, 540);
				context.fillText(dateVal[3].replace(/^0+/, ''), 880, 540);
			}
			// wrapText(context, data['住址'], 354, 676, 594, 68,10)
			drawTextWithSpacing(context, data['住址'], 354, 676, 14, {lineHeight:80}); // 添加 10px 字间距

			context.font="62px OCRB"; 
			drawTextWithSpacing(context, data['公民身份证号码'], 560, 1040, 4); // 添加 10px 字间距
		}

		// 添加通用字间距函数
		function drawTextWithSpacing(context, text, x, y, spacing, wrapText) {
		  context.save();
		  let currentPosition = x; // 起始位置
		  let index = -1; //换行

		  for (let i = 0; i < text.length; i++) {
		    const char = text[i];
		    //wrapText!==undefined 需要换行
		    if(wrapText!==undefined){
				if((i % 11) === 0){
					currentPosition = x;
					index ++;
				}
				context.fillText(char, currentPosition, y + (index * wrapText.lineHeight));
		    }else{
				context.fillText(char, currentPosition, y);
		    }
		    currentPosition += context.measureText(char).width + spacing; // 累加间距
		  }
		  context.restore();
		}

		// canvas绘制头像，去白背景
		function drawHeadIMG(src, threshold = 240){
	        removeCanvas('headCanvas')

			var headCanvas = document.createElement("canvas");
			let canvasBox = document.getElementById('canvasBox');
			canvasBox.appendChild(headCanvas);
			headCanvas.id = 'headCanvas';
 
			let img = document.createElement('img');
			img.src = src;
			img.crossOrigin = "Anonymous"; // 处理跨域
	        img.onload = () => {
	          	let ctx = headCanvas.getContext("2d");
				headCanvas.width = img.naturalWidth;
				headCanvas.height = img.naturalHeight;

				ctx.drawImage(img, 0, 0 );
				// 获取像素数据
				const imageData = ctx.getImageData(0, 0, img.naturalWidth, img.naturalHeight);
				const data = imageData.data;
				// 遍历每个像素
				for(let i = 0; i < data.length; i += 4){
					const r = data[i];
				    const g = data[i + 1];
				    const b = data[i + 2];
				    const a = data[i + 3];
				    // 判断是否接近白色（RGB 三通道均高于阈值）
				    if (r > threshold && g > threshold && b > threshold) {
				      data[i + 3] = 0; // 设置 alpha 通道为 0（完全透明）
				    }
				}
				// 更新画布像素数据
		  		ctx.putImageData(imageData, 0, 0);
		  		let mainCanvas = document.getElementById("mainCanvas");
				if(mainCanvas!==null){
					mergeCanvases(img.naturalWidth,img.naturalHeight)
				}
		  		
	        }
		}
		//合并canvas
		function mergeCanvases(w,h){
			const ctxA = document.getElementById("mainCanvas").getContext("2d");
			const ctxB = document.getElementById("headCanvas").getContext("2d");
			const scale = w/h;
			// 将 Canvas B 绘制到 Canvas A 的位置
			ctxA.drawImage(
			    document.getElementById("headCanvas"), // 源 Canvas
			    0, 0, w, h,                    // 源裁剪区域
			    1236, 190, 524, 524/scale                 // 目标绘制区域
			);
			copyCanvas('identityCard','mainCanvas') //身份证正面-左侧缩略图
	        removeCanvas('headCanvas')
	        leftImgShow('identityCard')
		}

		//复制内容到新 Canvas
		function copyCanvas(id,imgID){
			removeCanvas('thumbnail_'+imgID)
			const original = document.getElementById(imgID);
			const newCanvas = document.createElement("canvas");
			newCanvas.id = 'thumbnail_'+imgID
			newCanvas.width = original.width;
			newCanvas.height = original.height;
			newCanvas.getContext("2d").drawImage(original, 0, 0);
			let front = document.getElementById(id);
			front.after(newCanvas);
			front.style.display='none';
			// newCanvas.setAttribute('data-ID', imgID);
			newCanvas.addEventListener('click', function(event) { 
				document.getElementById("imageDisplay").style.display = 'none';
			    var siblings = original.parentNode.children;
			    // var display = original.style.display === 'none' ? 'block' : 'none'; // 切换显示状态
			    original.style.display = 'block'
			    for (var i = 0; i < siblings.length; i++) {
			        if (siblings[i] !== original) { // 确保不影响到自己
			            siblings[i].style.display = 'none'; // 直接设置样式
			        }
			    }
			});
		}
		function leftImgShow(id){
	        document.getElementById(id).parentNode.classList.add('imgShow')
		}

		#divSmallImages .cDivSmallImage{display: none;}
		#divSmallImages .imgShow{display: flex;}
	</style>

	</head>
	<body>
		<div id="divPageTitle">
			<h1>中安证件识别系统</h1>
		</div>
		<div id="pannel">
			<div id="settings" style="display:none">
				<input type="checkbox" id="RecogVIZ" checked/>识别版面信息<br/>
				<input type="checkbox" id="RecogRFID" checked/>读取芯片信息<br/>
				<input type="checkbox" id="Rejection"/>启用拒识功能<br/>
				<input type="checkbox" id="BarCode"/>启用条码识别<br/>
				<input type="checkbox" id="CallBack"/>启用回调模式<br/>
				<input type="checkbox" id="CardDetect"/>启用检测拿出<br/>
				<input type="checkbox" id="MRZOnWhite"/>白光图重新识别MRZ<br/>
				<input type="checkbox" id="UVDull"/>检测紫外迟钝特性<br/>
				<input type="checkbox" id="Fibre"/>检测紫外纤维<br/>
				<input type="checkbox" id="SourceType"/>检测是否复印件<br/>
				<input type="button" id="btnSaveSettings" value="保存" onclick="SaveSettings();"/>
				<input type="button" id="btnCancelSave"   value="取消" onclick="DonnotSaveSettings();"/>
			</div>
			<div id="control">
			
				<div style=" font-size:18px;display: inline-block;"> 
					<input type="checkbox" name="autoconnection" checked="checked" value="connecting" onchange="change()" >
					<span id="autoconnection">自动连接</span>
				</div>
				
				<input type="button" value="设置识读选项" onclick="showSettingPage();" style="display:none"/>
				<input type="button" data-value="ToBeConnect" id="connection" onclick="onConnection();"/>			
				<input type="button" value="Take Photos" id="TakePhotos" onclick="takePhotoOcr();" style="display:none" />							
				<input id="idSpecifiedRecog" type="button" value="Specified Recog" onclick="SpecifiedRecog();" style="display:none"/>
				
				<input type="button" value="Manual Trigger" id="ManualTrigger" onclick="onManualTrigger();" style="display:none"/>
				<input type="button" value="检测证件位置" id="DetectCardPosition" onclick="onDetectCardPosition();" style="display:none"/>
				<input type="button" value="二代证只读芯片" id="ReadSIDChip" onclick="SetReadSidChip('True');" style="display:none"/>
				<input type="button" value="二代证识别+读卡" id="NotReadSidChip" onclick="SetReadSidChip('False');" style="display:none"/>
				<select id="DevType" onfocus="this.defaultIndex=this.selectedIndex;" onchange="this.selectedIndex=this.defaultIndex;">
					<option value="PassportReader">护照阅读机</option>
					<option value="Scanner">扫描仪</option>
				</select>
				<select id="httpOrHttps" onchange = "ChangeConnectType();">
					<option value="http">http</option>
					<option value="https">https</option>
				</select>
				<!-- <div id="divPaddingDummy"></div> -->
				<div id="divDevStatus">
					<input id="idScanDocument" type="button" value="扫描识别" onclick="ScanDocument();" style="display:none"/>
					<span id="deviceStatus">WebSocket服务连接中・・・・・・</span>
					<span id="deviceNameKey" class="cDevStatusKey" style="display:none">设备名称:</span>
					<span id="deviceName"></span>
					<span id="deviceSerialKey" class="cDevStatusKey" style="display:none">设备序列号:</span>
					<span id="deviceSerial"></span>
					<span id="versionsKey" class="cDevStatusKey" style="display:none">版本:</span>
					<span id="versions"></span>
					<span id="errorMessageKey" class="cDevStatusKey" style="display:none">错误提示:</span>
					<span id="errorMessage"></span>
				</div>
			</div>
			<div id="cardInfo">
				<div id="divImages">
					<div id="divSmallImages">
						<div class="cDivSmallImage imgShow"><img id="imageWhite" class="cImage" src="png/Home_pic_bgicon.png" onclick="showImage('imageWhite');"/></div>
						<div class="cDivSmallImage imgShow"><img id="imageIR" class="cImage" src="png/Home_pic_bgicon.png" onclick="showImage('imageIR');"/></div>
						<div class="cDivSmallImage imgShow"><img id="imageUV" class="cImage" src="png/Home_pic_bgicon.png" onclick="showImage('imageUV');"/></div>
						<div class="cDivSmallImage imgShow"><img id="imageOcrHead" class="cImage" src="png/Home_pic_bgicon.png" onclick="showImage('imageOcrHead');"/></div>

						<div class="cDivSmallImage imgShow"><img id="identityCard" class="cImage" src="png/Home_pic_bgicon.png" /></div>
						<div class="cDivSmallImage imgShow"><img id="identityCardBack" class="cImage" src="png/Home_pic_bgicon.png" /></div>
						<div class="cDivSmallImage imgShow"><img id="imageChipHead" class="cImage" src="png/Home_pic_bgicon.png" onclick="showImage('imageChipHead');"/></div>
					</div>
					<div id="divBigImage" align="center">
						<img id="imageDisplay" class="bigImage" src="png/Home_pic_kong.png"/>
						<!-- <img id="imageDisplay" class="bigImage" src="../lib/Template/SIDPortrait.jpg"/> -->
						<img id="canvasImg" class="bigImage" src="../lib/Template/SIDPortrait.jpg" />
						<div id='canvasBox'></div> 
					</div>
				</div>
				<div id="divTextArea"></div>
			</div>
		</div>
	</body>
</html>
